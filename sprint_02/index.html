<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sprint 02 — Cadastro de Clientes</title>
  <link rel="stylesheet" href="/dev/style.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="badge">Sprint 02</div>
  <h1>Cadastro de <span>Clientes</span></h1>
  <p>Integração ViaCEP · Async/Await · LocalStorage</p>
</header>

<div class="layout">

  <!-- ── FORMULÁRIO ─────────────────────────── -->
  <aside class="panel">
    <div class="panel-title">Novo Cliente</div>

    <div class="form-row">

      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Ex: João Silva" />
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="joao@email.com" />
      </div>

      <div class="form-group">
        <label for="plano">Plano</label>
        <select id="plano">
          <option value="">Selecione um plano</option>
          <option value="básico">Básico</option>
          <option value="profissional">Profissional</option>
          <option value="enterprise">Enterprise</option>
        </select>
      </div>

    </div>

    <div class="divider"></div>

    <div class="form-row">

      <div class="form-group">
        <label for="cep">CEP</label>
        <input type="text" id="cep" placeholder="00000-000" maxlength="9" />
        <div class="msg" id="msg-cep"></div>
      </div>

      <div class="form-group">
        <label for="logradouro">Logradouro</label>
        <input type="text" id="logradouro" readonly placeholder="Preenchido automaticamente" />
      </div>

      <div class="form-group">
        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" readonly placeholder="Preenchido automaticamente" />
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" readonly placeholder="—" />
        </div>
        <div class="form-group">
          <label for="uf">UF</label>
          <input type="text" id="uf" readonly placeholder="—" />
        </div>
      </div>

    </div>

    <div class="msg" id="msg-form"></div>
    <button id="btn-salvar">SALVAR CLIENTE</button>
  </aside>

  <!-- ── LISTA ──────────────────────────────── -->
  <section class="panel">
    <div class="panel-title">Clientes Cadastrados</div>
    <div class="counter" id="counter">
      <strong>0</strong> cliente(s) registrado(s)
    </div>
    <div id="lista-clientes">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>Nenhum cliente cadastrado ainda.</p>
      </div>
    </div>
  </section>

</div>

<script src="/dev/script.js"></script>

</body>
</html>
